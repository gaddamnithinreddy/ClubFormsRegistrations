<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Create and manage club registration forms, events, and member signups easily." />
    <link rel="apple-touch-icon" href="/vite.svg" />
    <title>Club Forms & Registrations</title>
    <style>
      #loading-screen {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #f9fafb;
        color: #1f2937;
        flex-direction: column;
        gap: 1rem;
      }
      .dark #loading-screen {
        background-color: #111827;
        color: #f3f4f6;
      }
      .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top: 3px solid #3b82f6;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <script>
      // Add debugging information
      console.log('Initial page load started');
      window.addEventListener('load', function() {
        console.log('Window load event fired');
      });
      window.addEventListener('error', function(event) {
        console.error('Global error:', event.error);
      });
      // Check if the script loads
      window.addEventListener('DOMContentLoaded', function() {
        console.log('DOM Content loaded');
        const script = document.querySelector('script[type="module"]');
        console.log('Main script element:', script?.src);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <noscript>You need to enable JavaScript to run this app.</noscript>
      <div id="loading-screen">
        <div class="loading-spinner"></div>
        <div>Loading Club Forms & Registrations...</div>
        <div id="load-status" style="font-size: 0.875rem; color: #6b7280;"></div>
      </div>
    </div>
    <script>
      // Add status updates
      const statusEl = document.getElementById('load-status');
      let dots = '';
      setInterval(() => {
        dots = dots.length >= 3 ? '' : dots + '.';
        if (statusEl) {
          statusEl.textContent = 'Initializing application' + dots;
        }
      }, 500);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
